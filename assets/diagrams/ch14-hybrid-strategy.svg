<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #1a1a1a; }
      .label { font-size: 14px; font-weight: 600; fill: #ffffff; }
      .label-dark { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .sublabel { font-size: 12px; fill: #666666; }
      .bullet { font-size: 12px; fill: #333333; }
    </style>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0060B6"/>
    </marker>
    <marker id="arrowL" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#27ae60"/>
    </marker>
    <marker id="arrowD" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">Hybrid AI Strategy: Local + Cloud</text>

  <!-- Left: Local Models -->
  <rect x="30" y="80" width="220" height="160" rx="12" fill="#27ae60"/>
  <text x="140" y="115" text-anchor="middle" class="label" font-size="16">Local Models</text>
  <line x1="60" y1="125" x2="220" y2="125" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1"/>
  <rect x="50" y="138" width="180" height="32" rx="6" fill="#219a52"/>
  <text x="140" y="159" text-anchor="middle" font-size="13" fill="#ffffff">Ollama</text>
  <rect x="50" y="180" width="180" height="32" rx="6" fill="#219a52"/>
  <text x="140" y="201" text-anchor="middle" font-size="13" fill="#ffffff">LM Studio</text>

  <!-- Right: Cloud APIs -->
  <rect x="550" y="80" width="220" height="160" rx="12" fill="#0060B6"/>
  <text x="660" y="115" text-anchor="middle" class="label" font-size="16">Cloud APIs</text>
  <line x1="580" y1="125" x2="740" y2="125" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1"/>
  <rect x="570" y="138" width="180" height="28" rx="6" fill="#004e94"/>
  <text x="660" y="157" text-anchor="middle" font-size="12" fill="#ffffff">OpenAI (GPT-4)</text>
  <rect x="570" y="172" width="180" height="28" rx="6" fill="#004e94"/>
  <text x="660" y="191" text-anchor="middle" font-size="12" fill="#ffffff">Anthropic (Claude)</text>
  <rect x="570" y="206" width="180" height="28" rx="6" fill="#004e94"/>
  <text x="660" y="225" text-anchor="middle" font-size="12" fill="#ffffff">AWS Bedrock</text>

  <!-- Center Hub: NeamCode -->
  <rect x="300" y="110" width="200" height="80" rx="16" fill="#BE0027" stroke="#9a0020" stroke-width="1"/>
  <text x="400" y="148" text-anchor="middle" class="label" font-size="18">NeamCode</text>
  <text x="400" y="170" text-anchor="middle" font-size="12" fill="#f8d7da">Intelligent Hub</text>

  <!-- Left arrows (bidirectional) -->
  <line x1="250" y1="145" x2="295" y2="145" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <line x1="295" y1="160" x2="250" y2="160" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrowL)"/>

  <!-- Right arrows (bidirectional) -->
  <line x1="505" y1="145" x2="545" y2="145" stroke="#0060B6" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <line x1="545" y1="160" x2="505" y2="160" stroke="#0060B6" stroke-width="2.5" marker-end="url(#arrowL)"/>

  <!-- Arrow down to Hybrid Strategy -->
  <line x1="400" y1="190" x2="400" y2="275" stroke="#888888" stroke-width="2" marker-end="url(#arrowD)"/>

  <!-- Hybrid Strategy Box -->
  <rect x="120" y="280" width="560" height="170" rx="14" fill="#ffffff" stroke="#dee2e6" stroke-width="2"/>
  <rect x="120" y="280" width="560" height="40" rx="14" fill="#343a40"/>
  <!-- Cover bottom corners of header -->
  <rect x="120" y="306" width="560" height="14" fill="#343a40"/>
  <text x="400" y="306" text-anchor="middle" class="label" font-size="16">Hybrid Strategy</text>

  <!-- Bullet 1 -->
  <circle cx="160" cy="348" r="5" fill="#27ae60"/>
  <text x="178" y="352" class="bullet" font-weight="600">Start Local, Escalate to Cloud</text>
  <text x="178" y="370" class="sublabel">Try fast local inference first; if confidence is low, route to a cloud model.</text>

  <!-- Bullet 2 -->
  <circle cx="160" cy="398" r="5" fill="#0060B6"/>
  <text x="178" y="402" class="bullet" font-weight="600">Privacy Filter: Route Sensitive Data Locally</text>
  <text x="178" y="420" class="sublabel">PII and confidential data stays on-device; only sanitized prompts reach the cloud.</text>

  <!-- Bullet 3 -->
  <circle cx="160" cy="438" r="5" fill="#BE0027"/>
  <text x="178" y="442" class="bullet" font-weight="600">Cost-Aware Fallback</text>
  <text x="178" y="458" class="sublabel">Budget limits trigger automatic fallback from expensive cloud APIs to local models.</text>
</svg>