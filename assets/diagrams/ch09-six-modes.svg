<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 700 650">
  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="20" font-weight="700" fill="#24292f">Six NeamCode Modes</text>

  <!-- Central circle -->
  <circle cx="350" cy="330" r="65" fill="#0060B6" stroke="#003d73" stroke-width="2"/>
  <text x="350" y="325" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="18" font-weight="700" fill="white">Neam</text>
  <text x="350" y="347" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="18" font-weight="700" fill="white">Code</text>

  <!-- Mode 1: Explore (top) -->
  <line x1="350" y1="265" x2="350" y2="170" stroke="#0060B6" stroke-width="2"/>
  <rect x="270" y="80" width="160" height="90" rx="8" fill="#e8f4fd" stroke="#0060B6" stroke-width="2"/>
  <circle cx="350" cy="110" r="18" fill="#0060B6" opacity="0.15"/>
  <text x="350" y="115" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="20" fill="#0060B6">&#x1F50D;</text>
  <text x="350" y="148" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="15" font-weight="600" fill="#0060B6">Explore</text>
  <text x="350" y="163" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#24292f">Navigate &amp; discover</text>

  <!-- Mode 2: Debug (top-right) -->
  <line x1="407" y1="287" x2="490" y2="205" stroke="#BE0027" stroke-width="2"/>
  <rect x="460" y="115" width="160" height="90" rx="8" fill="#fde8ec" stroke="#BE0027" stroke-width="2"/>
  <circle cx="540" cy="145" r="18" fill="#BE0027" opacity="0.15"/>
  <text x="540" y="150" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="20" fill="#BE0027">&#x1F41B;</text>
  <text x="540" y="183" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="15" font-weight="600" fill="#BE0027">Debug</text>
  <text x="540" y="198" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#24292f">Find &amp; fix bugs</text>

  <!-- Mode 3: Test (bottom-right) -->
  <line x1="407" y1="373" x2="490" y2="455" stroke="#1a7f37" stroke-width="2"/>
  <rect x="460" y="425" width="160" height="90" rx="8" fill="#e6f4ea" stroke="#1a7f37" stroke-width="2"/>
  <circle cx="540" cy="455" r="18" fill="#1a7f37" opacity="0.15"/>
  <text x="540" y="460" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="20" fill="#1a7f37">&#x2713;</text>
  <text x="540" y="493" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="15" font-weight="600" fill="#1a7f37">Test</text>
  <text x="540" y="508" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#24292f">Write &amp; run tests</text>

  <!-- Mode 4: Analyze (bottom) -->
  <line x1="350" y1="395" x2="350" y2="490" stroke="#9a6700" stroke-width="2"/>
  <rect x="270" y="490" width="160" height="90" rx="8" fill="#fff8e1" stroke="#9a6700" stroke-width="2"/>
  <circle cx="350" cy="520" r="18" fill="#9a6700" opacity="0.15"/>
  <text x="350" y="525" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="20" fill="#9a6700">&#x1F4CA;</text>
  <text x="350" y="558" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="15" font-weight="600" fill="#9a6700">Analyze</text>
  <text x="350" y="573" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#24292f">Metrics &amp; insights</text>

  <!-- Mode 5: Deploy (bottom-left) -->
  <line x1="293" y1="373" x2="210" y2="455" stroke="#8250df" stroke-width="2"/>
  <rect x="80" y="425" width="160" height="90" rx="8" fill="#f0e6fa" stroke="#8250df" stroke-width="2"/>
  <circle cx="160" cy="455" r="18" fill="#8250df" opacity="0.15"/>
  <text x="160" y="460" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="20" fill="#8250df">&#x1F680;</text>
  <text x="160" y="493" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="15" font-weight="600" fill="#8250df">Deploy</text>
  <text x="160" y="508" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#24292f">Ship to production</text>

  <!-- Mode 6: Ideate (top-left) -->
  <line x1="293" y1="287" x2="210" y2="205" stroke="#9a6700" stroke-width="2"/>
  <rect x="80" y="115" width="160" height="90" rx="8" fill="#fff8e1" stroke="#9a6700" stroke-width="2"/>
  <circle cx="160" cy="145" r="18" fill="#9a6700" opacity="0.15"/>
  <text x="160" y="150" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="20" fill="#9a6700">&#x1F4A1;</text>
  <text x="160" y="183" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="15" font-weight="600" fill="#9a6700">Ideate</text>
  <text x="160" y="198" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#24292f">Brainstorm ideas</text>

  <!-- Subtitle -->
  <text x="350" y="630" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="13" fill="#24292f" font-style="italic">Switch modes with slash commands to focus AI behavior</text>
</svg>