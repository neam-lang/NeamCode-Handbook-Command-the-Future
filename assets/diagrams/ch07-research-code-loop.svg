<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 700 500">
  <defs>
    <marker id="arr7" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0060B6"/>
    </marker>
    <marker id="arr7g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a7f37"/>
    </marker>
  </defs>

  <!-- Cycle nodes positioned in a circle -->
  <!-- Center: 350, 230; radius ~150 -->

  <!-- 1. Question (top) -->
  <rect x="285" y="50" width="130" height="50" rx="8" fill="#0060B6" stroke="#004a8f" stroke-width="2"/>
  <text x="350" y="80" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="14" fill="white" font-weight="600">Question</text>

  <!-- 2. Search (top-right) -->
  <rect x="500" y="130" width="150" height="50" rx="8" fill="none" stroke="#8250df" stroke-width="2"/>
  <text x="575" y="150" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="13" fill="#8250df" font-weight="600">Search</text>
  <text x="575" y="168" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#666">web_search</text>

  <!-- 3. Understand (right) -->
  <rect x="500" y="245" width="150" height="50" rx="8" fill="none" stroke="#9a6700" stroke-width="2"/>
  <text x="575" y="265" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="13" fill="#9a6700" font-weight="600">Understand</text>
  <text x="575" y="283" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#666">analyze results</text>

  <!-- 4. Implement (bottom) -->
  <rect x="285" y="350" width="130" height="50" rx="8" fill="none" stroke="#1a7f37" stroke-width="2"/>
  <text x="350" y="370" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="13" fill="#1a7f37" font-weight="600">Implement</text>
  <text x="350" y="388" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#666">file_edit</text>

  <!-- 5. Verify (left) -->
  <rect x="50" y="245" width="150" height="50" rx="8" fill="none" stroke="#BE0027" stroke-width="2"/>
  <text x="125" y="265" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="13" fill="#BE0027" font-weight="600">Verify</text>
  <text x="125" y="283" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#666">bash (run tests)</text>

  <!-- Done branch -->
  <rect x="50" y="130" width="150" height="50" rx="8" fill="#1a7f37" stroke="#14622c" stroke-width="2"/>
  <text x="125" y="161" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="15" fill="white" font-weight="700">Done</text>

  <!-- Arrows: Question -> Search -->
  <line x1="415" y1="75" x2="498" y2="140" stroke="#0060B6" stroke-width="2" marker-end="url(#arr7)"/>

  <!-- Search -> Understand -->
  <line x1="575" y1="180" x2="575" y2="243" stroke="#0060B6" stroke-width="2" marker-end="url(#arr7)"/>

  <!-- Understand -> Implement -->
  <line x1="500" y1="280" x2="417" y2="355" stroke="#0060B6" stroke-width="2" marker-end="url(#arr7)"/>

  <!-- Implement -> Verify -->
  <line x1="285" y1="380" x2="202" y2="280" stroke="#0060B6" stroke-width="2" marker-end="url(#arr7)"/>

  <!-- Verify -> Question (back to cycle) -->
  <line x1="125" y1="245" x2="200" y2="155" stroke="#0060B6" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="200" y1="155" x2="283" y2="85" stroke="#0060B6" stroke-width="2" marker-end="url(#arr7)" stroke-dasharray="6,3"/>
  <text x="145" y="195" font-family="'Inter', Arial, sans-serif" font-size="10" fill="#0060B6">needs more</text>
  <text x="145" y="207" font-family="'Inter', Arial, sans-serif" font-size="10" fill="#0060B6">research</text>

  <!-- Verify -> Done -->
  <line x1="125" y1="245" x2="125" y2="182" stroke="#1a7f37" stroke-width="2" marker-end="url(#arr7g)"/>
  <text x="137" y="220" font-family="'Inter', Arial, sans-serif" font-size="10" fill="#1a7f37">pass</text>

  <!-- Step numbers -->
  <circle cx="275" cy="55" r="12" fill="#0060B6"/>
  <text x="275" y="59" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="10" fill="white" font-weight="700">1</text>

  <circle cx="490" cy="135" r="12" fill="#8250df"/>
  <text x="490" y="139" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="10" fill="white" font-weight="700">2</text>

  <circle cx="490" cy="250" r="12" fill="#9a6700"/>
  <text x="490" y="254" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="10" fill="white" font-weight="700">3</text>

  <circle cx="275" cy="355" r="12" fill="#1a7f37"/>
  <text x="275" y="359" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="10" fill="white" font-weight="700">4</text>

  <circle cx="40" cy="250" r="12" fill="#BE0027"/>
  <text x="40" y="254" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="10" fill="white" font-weight="700">5</text>

  <!-- Chapter label -->
  <text x="350" y="470" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="11" fill="#999">Chapter 7 — Research-Code Loop</text>
</svg>