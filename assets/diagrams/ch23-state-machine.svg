<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
    </style>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0060B6" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#BE0027" />
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" rx="12" fill="#f9fafb" />

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">Chapter 23 &#x2014; Bug Investigation State Machine</text>

  <!-- Start indicator -->
  <circle cx="60" cy="200" r="8" fill="#333" />
  <line x1="68" y1="200" x2="110" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrow-gray)" />

  <!-- State 1: Initial (gray) -->
  <rect x="115" y="170" width="130" height="60" rx="14" fill="#f6f8fa" stroke="#57606a" stroke-width="2.5" filter="url(#shadow)" />
  <text x="180" y="205" text-anchor="middle" font-size="15" font-weight="600" fill="#57606a">Initial</text>

  <!-- Transition: Initial -> Investigating -->
  <line x1="245" y1="200" x2="310" y2="200" stroke="#0060B6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <text x="278" y="190" text-anchor="middle" font-size="11" fill="#0060B6" font-weight="600">begin</text>

  <!-- State 2: Investigating (blue) -->
  <rect x="315" y="170" width="160" height="60" rx="14" fill="#e8f4fd" stroke="#0060B6" stroke-width="2.5" filter="url(#shadow)" />
  <text x="395" y="205" text-anchor="middle" font-size="15" font-weight="600" fill="#0060B6">Investigating</text>

  <!-- Transition: Investigating -> Hypothesis -->
  <line x1="475" y1="200" x2="545" y2="200" stroke="#0060B6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <text x="510" y="190" text-anchor="middle" font-size="11" fill="#0060B6" font-weight="600">form theory</text>

  <!-- State 3: Hypothesis (blue/amber) -->
  <rect x="550" y="170" width="140" height="60" rx="14" fill="#fff8e1" stroke="#9a6700" stroke-width="2.5" filter="url(#shadow)" />
  <text x="620" y="205" text-anchor="middle" font-size="15" font-weight="600" fill="#9a6700">Hypothesis</text>

  <!-- Transition: Hypothesis -> Testing Fix (down) -->
  <line x1="620" y1="230" x2="620" y2="300" stroke="#0060B6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <text x="650" y="270" font-size="11" fill="#0060B6" font-weight="600">apply fix</text>

  <!-- State 4: Testing Fix (blue) -->
  <rect x="545" y="305" width="150" height="60" rx="14" fill="#e8f4fd" stroke="#0060B6" stroke-width="2.5" filter="url(#shadow)" />
  <text x="620" y="340" text-anchor="middle" font-size="15" font-weight="600" fill="#0060B6">Testing Fix</text>

  <!-- Transition: Testing Fix -> Resolved (success, right/down) -->
  <line x1="620" y1="365" x2="620" y2="415" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrow-green)" />
  <text x="650" y="395" font-size="11" fill="#27ae60" font-weight="bold">tests pass</text>

  <!-- State 5: Resolved (green, double border) -->
  <rect x="545" y="420" width="150" height="55" rx="14" fill="#e6f4ea" stroke="#27ae60" stroke-width="3" filter="url(#shadow)" />
  <rect x="551" y="426" width="138" height="43" rx="10" fill="none" stroke="#27ae60" stroke-width="1.5" />
  <text x="620" y="452" text-anchor="middle" font-size="16" font-weight="700" fill="#27ae60">Resolved</text>

  <!-- Red loop: Testing Fix -> Investigating (tests fail) -->
  <path d="M 545 335 Q 430 335 395 250 Q 395 237 395 230" fill="none" stroke="#BE0027" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)" />
  <rect x="410" y="290" width="100" height="24" rx="12" fill="#fde8ec" stroke="#BE0027" stroke-width="1" />
  <text x="460" y="307" text-anchor="middle" font-size="11" fill="#BE0027" font-weight="bold">tests fail</text>

  <!-- Legend -->
  <rect x="40" y="435" width="16" height="16" rx="3" fill="#f6f8fa" stroke="#57606a" stroke-width="1.5" />
  <text x="62" y="449" font-size="12" fill="#555">Initial</text>
  <rect x="120" y="435" width="16" height="16" rx="3" fill="#e8f4fd" stroke="#0060B6" stroke-width="1.5" />
  <text x="142" y="449" font-size="12" fill="#555">Active State</text>
  <rect x="240" y="435" width="16" height="16" rx="3" fill="#fff8e1" stroke="#9a6700" stroke-width="1.5" />
  <text x="262" y="449" font-size="12" fill="#555">Hypothesis</text>
  <rect x="350" y="435" width="16" height="16" rx="3" fill="#e6f4ea" stroke="#27ae60" stroke-width="1.5" />
  <text x="372" y="449" font-size="12" fill="#555">Resolved</text>
</svg>
