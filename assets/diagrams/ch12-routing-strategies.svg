<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #1a1a1a; }
      .label { font-size: 14px; font-weight: 600; fill: #ffffff; }
      .label-dark { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .sublabel { font-size: 12px; fill: #555555; }
      .arrow-label { font-size: 11px; fill: #666666; font-style: italic; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">Provider Routing Strategies</text>

  <!-- User Prompt Box -->
  <rect x="310" y="55" width="180" height="44" rx="10" fill="#0060B6"/>
  <text x="400" y="82" text-anchor="middle" class="label">User Prompt</text>

  <!-- Arrow down to router -->
  <line x1="400" y1="99" x2="400" y2="140" stroke="#888888" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- NeamCode Router Diamond -->
  <polygon points="400,145 500,200 400,255 300,200" fill="#ffffff" stroke="#0060B6" stroke-width="2.5"/>
  <text x="400" y="196" text-anchor="middle" class="label-dark" font-size="13">NeamCode</text>
  <text x="400" y="212" text-anchor="middle" class="label-dark" font-size="13">Router</text>

  <!-- Left branch arrow -->
  <line x1="300" y1="200" x2="140" y2="320" stroke="#888888" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="195" y="270" text-anchor="middle" class="arrow-label" transform="rotate(-30, 195, 270)">Simple / Fast</text>

  <!-- Center branch arrow -->
  <line x1="400" y1="255" x2="400" y2="320" stroke="#888888" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="445" y="295" text-anchor="start" class="arrow-label">Complex / Creative</text>

  <!-- Right branch arrow -->
  <line x1="500" y1="200" x2="660" y2="320" stroke="#888888" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="595" y="270" text-anchor="middle" class="arrow-label" transform="rotate(30, 595, 270)">Cost-Sensitive</text>

  <!-- Left endpoint: Local Model -->
  <rect x="40" y="325" width="200" height="80" rx="12" fill="#27ae60"/>
  <text x="140" y="355" text-anchor="middle" class="label" font-size="15">Local Model</text>
  <text x="140" y="375" text-anchor="middle" class="label" font-size="12" font-weight="400">(Ollama)</text>
  <text x="140" y="395" text-anchor="middle" font-size="11" fill="#d4edda" font-weight="400">Fast, Free, Private</text>

  <!-- Center endpoint: Claude / GPT-4 -->
  <rect x="300" y="325" width="200" height="80" rx="12" fill="#BE0027"/>
  <text x="400" y="355" text-anchor="middle" class="label" font-size="15">Claude / GPT-4</text>
  <text x="400" y="375" text-anchor="middle" class="label" font-size="12" font-weight="400">(Cloud API)</text>
  <text x="400" y="395" text-anchor="middle" font-size="11" fill="#f8d7da" font-weight="400">Powerful, Accurate</text>

  <!-- Right endpoint: Budget Router -->
  <rect x="560" y="325" width="200" height="80" rx="12" fill="#0060B6"/>
  <text x="660" y="355" text-anchor="middle" class="label" font-size="15">Budget Router</text>
  <text x="660" y="375" text-anchor="middle" class="label" font-size="12" font-weight="400">(Auto-Select)</text>
  <text x="660" y="395" text-anchor="middle" font-size="11" fill="#cce5ff" font-weight="400">Cost-Optimized</text>

  <!-- Bottom info bar -->
  <rect x="100" y="440" width="600" height="55" rx="10" fill="#ffffff" stroke="#dee2e6" stroke-width="1"/>
  <text x="400" y="462" text-anchor="middle" font-size="12" fill="#555555" font-weight="600">NeamCode routes each prompt to the optimal provider based on</text>
  <text x="400" y="480" text-anchor="middle" font-size="12" fill="#555555">complexity, latency requirements, cost budget, and privacy constraints.</text>
</svg>