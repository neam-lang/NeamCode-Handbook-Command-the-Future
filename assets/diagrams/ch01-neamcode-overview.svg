<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 720 420">
  <defs>
    <marker id="arrowhead1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0060B6"/>
    </marker>
    <marker id="arrowhead1g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a7f37"/>
    </marker>
  </defs>

  <!-- You (natural language) -->
  <rect x="40" y="175" width="160" height="60" rx="8" fill="none" stroke="#24292f" stroke-width="2"/>
  <text x="120" y="200" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="14" fill="#24292f" font-weight="600">You</text>
  <text x="120" y="220" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="11" fill="#666">(natural language)</text>

  <!-- Arrow: You -> NeamCode -->
  <line x1="200" y1="205" x2="270" y2="205" stroke="#0060B6" stroke-width="2" marker-end="url(#arrowhead1)"/>

  <!-- NeamCode (central, prominent) -->
  <rect x="280" y="160" width="180" height="80" rx="12" fill="#0060B6" stroke="#004a8f" stroke-width="2"/>
  <text x="370" y="195" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="18" fill="white" font-weight="700">NeamCode</text>
  <text x="370" y="218" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="11" fill="#b3d4f5">AI-Powered CLI</text>

  <!-- AI Provider (above) -->
  <rect x="310" y="30" width="120" height="50" rx="8" fill="none" stroke="#8250df" stroke-width="2"/>
  <text x="370" y="52" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#8250df" font-weight="600">AI Provider</text>
  <text x="370" y="68" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#8250df">Claude / GPT</text>

  <!-- Arrow: NeamCode <-> AI Provider -->
  <line x1="370" y1="160" x2="370" y2="80" stroke="#8250df" stroke-width="2" marker-end="url(#arrowhead1)" stroke-dasharray="6,3"/>
  <line x1="362" y1="80" x2="362" y2="160" stroke="#8250df" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Arrows from NeamCode to 3 outputs -->
  <line x1="460" y1="185" x2="540" y2="130" stroke="#1a7f37" stroke-width="2" marker-end="url(#arrowhead1g)"/>
  <line x1="460" y1="200" x2="540" y2="200" stroke="#1a7f37" stroke-width="2" marker-end="url(#arrowhead1g)"/>
  <line x1="460" y1="215" x2="540" y2="275" stroke="#1a7f37" stroke-width="2" marker-end="url(#arrowhead1g)"/>

  <!-- Read Code -->
  <rect x="550" y="100" width="140" height="55" rx="8" fill="none" stroke="#1a7f37" stroke-width="2"/>
  <text x="620" y="124" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="13" fill="#1a7f37" font-weight="600">Read Code</text>
  <text x="620" y="142" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#666">file_read, grep</text>

  <!-- Write Code -->
  <rect x="550" y="175" width="140" height="55" rx="8" fill="none" stroke="#1a7f37" stroke-width="2"/>
  <text x="620" y="199" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="13" fill="#1a7f37" font-weight="600">Write Code</text>
  <text x="620" y="217" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#666">file_edit, write</text>

  <!-- Run Commands -->
  <rect x="550" y="250" width="140" height="55" rx="8" fill="none" stroke="#1a7f37" stroke-width="2"/>
  <text x="620" y="274" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="13" fill="#1a7f37" font-weight="600">Run Commands</text>
  <text x="620" y="292" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#666">bash, terminal</text>

  <!-- Chapter label -->
  <text x="360" y="390" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="11" fill="#999">Chapter 1 — What NeamCode Is</text>
</svg>